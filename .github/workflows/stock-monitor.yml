import os
import requests
import yfinance as yf

WEBHOOK = os.getenv("DISCORD_WEBHOOK_URL")
TICKERS = [x.strip() for x in os.getenv("PORTFOLIO_TICKERS", "AAPL,MSFT").split(",") if x.strip()]

def send(msg):
    if not WEBHOOK:
        print("DISCORD_WEBHOOK_URL missing")
        return
    r = requests.post(WEBHOOK, json={"content": msg})
    print("discord status:", r.status_code)
    print("discord body:", r.text[:200])

def check():
    results = []

    if not WEBHOOK:
        print("WEBHOOK is empty")
        return

    for t in TICKERS:
        try:
            data = yf.Ticker(t)
            price = data.fast_info.get("lastPrice")
            if price:
                results.append(f"{t}: {price}")
            else:
                results.append(f"{t}: 데이터 없음")
        except Exception as e:
            results.append(f"{t}: 오류 - {str(e)}")

    msg = "📩 자동 테스트 메시지\n" + "\n".join(results)
    send(msg)

if __name__ == "__main__":
    check()
